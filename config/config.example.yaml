# cora configuration example
# Copy to ~/.config/cora/config.yaml and fill in your values.

services:
  # ── GitCode ──────────────────────────────────────────────────────────────────
  # Built-in service — spec is embedded in the binary (no spec_url needed).
  # base_url is required; no default is provided.
  # Get your personal access token at: https://gitcode.com/-/user_settings/personal_access_tokens
  gitcode:
    base_url: https://api.gitcode.com
    auth:
      gitcode:
        access_token: YOUR_GITCODE_PERSONAL_ACCESS_TOKEN

  # ── GitHub ───────────────────────────────────────────────────────────────────
  # Built-in service — spec is embedded in the binary (no spec_url needed).
  # base_url is required; the canonical public endpoint is shown below. For
  # GitHub Enterprise Server, set it to https://<your-host>/api/v3.
  #
  # Auth: GitHub uses an OAuth/PAT bearer token.
  # Create a fine-grained token (recommended) or a classic PAT at:
  #   https://github.com/settings/tokens
  # Required scopes depend on which endpoints you call (e.g. `repo` for private
  # repos, `read:org` for organization metadata, `read:user` for user info).
  # The token is sent as `Authorization: Bearer <token>` on every request,
  # alongside `X-GitHub-Api-Version: 2022-11-28`.
  github:
    base_url: https://api.github.com
    auth:
      github:
        token: YOUR_GITHUB_PERSONAL_ACCESS_TOKEN

  # ── Etherpad ─────────────────────────────────────────────────────────────────
  # Built-in service — spec is embedded in the binary (no spec_url needed).
  # base_url is required; set it to your Etherpad instance's API root.
  etherpad:
    base_url: https://your-etherpad-host/api/1.3.0
    auth:
      etherpad:
        api_key: YOUR_ETHERPAD_API_KEY

  # ── Jenkins ──────────────────────────────────────────────────────────────────
  # Built-in service — spec is embedded in the binary (no spec_url needed).
  # base_url is required; set it to your Jenkins server's root.
  #
  # Auth: Jenkins uses HTTP Basic Auth with username + API token.
  # Generate an API token at: JENKINS_URL/user/<you>/configure
  # The credentials are sent as Authorization: Basic base64(username:api_token)
  # on every request.
  jenkins:
    base_url: https://jenkins.example.com
    auth:
      jenkins:
        username: YOUR_JENKINS_USERNAME
        api_token: YOUR_JENKINS_API_TOKEN

  # ── Forum (Discourse) ─────────────────────────────────────────────────────────
  # spec_url: URL or local path to the service's OpenAPI spec.
  # Supported: http://, https://, file://, or a bare filesystem path.
  forum:
    spec_url: assets/openapi/forum/openapi.json

    # base_url: the actual API root of your Discourse instance.
    base_url: http://localhost:3000

    auth:
      discourse:
        api_key: "YOUR_DISCOURSE_API_KEY"
        api_username: "system"

  # ── Custom service example ────────────────────────────────────────────────────
  # Any service exposing an OpenAPI 3.0 spec can be added here without
  # modifying CLI code. The spec is fetched and cached automatically.
  # mail:
  #   spec_url: https://lists.example.org/openapi.yaml
  #   base_url: https://lists.example.org

# Global spec cache settings (optional — defaults shown)
spec_cache:
  ttl: 24h                          # re-fetch after 24 hours
  dir: ~/.config/cora/cache         # where to store cached specs

views_file: ~/.config/cora/views.yaml