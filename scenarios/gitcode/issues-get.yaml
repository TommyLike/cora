name: "gitcode/issues-get"
service: gitcode
args:
  - issues
  - get
  - --owner
  - openeuler
  - --repo
  - infrastructure
  - --number
  - 404
format: json
timeout_ms: 5000
assertions:
  - type: exit_code
    value: 0
  - type: json_has_keys
    values: ["title", "state", "number", "user", "created_at", "html_url"]
  - type: json_key_not_empty
    key: "title"